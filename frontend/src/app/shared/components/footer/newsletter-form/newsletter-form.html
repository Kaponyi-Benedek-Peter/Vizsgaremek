<div class="newsletter">
  <div class="social-icons">
    <div class="social-icon-wrapper" *ngFor="let social of socialLinks; trackBy: trackBySocialName">
      <a *ngIf="social.url" [href]="social.url" target="_blank" [attr.aria-label]="social.name">
        <img [src]="social.icon" [alt]="social.name" />
      </a>

      <ng-container *ngIf="!social.url">
        <button
          class="social-icon-btn"
          (click)="toggleSocialTooltip(social.name)"
          [attr.aria-label]="social.name"
        >
          <img [src]="social.icon" [alt]="social.name" />
        </button>

        <div class="social-tooltip" *ngIf="activeSocialTooltip === social.name">
          {{ 'footer.no_social_link' | translate }}
        </div>
      </ng-container>
    </div>
  </div>

  <p>{{ 'footer.newsletter' | translate }}</p>

  <div class="newsletter-lang-selector">
    <button class="newsletter-lang-btn">
      <img [src]="currentLangOption.flag" [alt]="currentLangOption.name" class="newsletter-flag" />
      <span class="newsletter-lang-name">{{ currentLangOption.name }}</span>
      <span class="newsletter-lang-arrow" [class.open]="isLangDropdownOpen">▾</span>
    </button>

    <div class="newsletter-lang-dropdown" *ngIf="isLangDropdownOpen">
      <button
        class="newsletter-lang-item"
        type="button"
        *ngFor="let lang of languages; trackBy: trackByLangCode"
        [class.active]="newsletterLang === lang.code"
        (click)="selectNewsletterLang(lang.code)"
      >
        <img [src]="lang.flag" [alt]="lang.name" class="newsletter-flag" />
        <span>{{ lang.name }}</span>
      </button>
    </div>
  </div>

  <form (ngSubmit)="onSubmit()">
    <input
      type="email"
      [placeholder]="'footer.emailPlaceholder' | translate"
      [(ngModel)]="email"
      name="email"
      required
    />
    <button type="submit" [disabled]="isSubmitting">
      {{ isSubmitting ? ('footer.sending' | translate) : ('footer.send' | translate) }}
    </button>
  </form>
</div>
